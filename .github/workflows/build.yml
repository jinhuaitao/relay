name: Build, Release and Publish Docker

on:
  push:
    branches:
      - main
    paths:
      - 'main.go' # 仅当 main.go 被修改时才自动触发编译
  workflow_dispatch: # 允许手动触发

permissions:
  contents: write

jobs:
  # ========================================
  # 阶段一：编译二进制文件
  # ========================================
  build-binary:
    name: Build for ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            filename: relay-linux-amd64
          - os: linux
            arch: arm64
            filename: relay-linux-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0 
        run: |
          go build -ldflags "-s -w" -o ${{ matrix.filename }} main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.filename }}
          retention-days: 1

  # ========================================
  # 阶段二：发布 Release 并推送 Docker
  # ========================================
  release-and-publish:
    name: Release and Publish Docker
    runs-on: ubuntu-latest
    needs: build-binary # 必须等待编译阶段完成
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      # 1. 自动生成版本号
      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      # 2. 创建 GitHub Release
      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      # 3. 配置 Docker 环境
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      # 4. 提取 Docker 标签 (加入了刚刚生成的 Release 版本号)
      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        env:
          TZ: 'Asia/Tokyo'
        with:
          images: jhtone/relay
          tags: |
            type=raw,value=latest
            type=raw,value=${{ steps.tag_version.outputs.new_tag }}
            type=raw,value={{date 'YYYYMMDD'}}

      # 5. 构建并推送 Docker 镜像
      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 6. 发送合并后的成功通知
      - name: Send Telegram Notification on Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            🎉 Relay 转发面板更新成功！
            
            📦 项目: ${{ github.repository }}
            🏷️ 版本: ${{ steps.tag_version.outputs.new_tag }}
            
            🔗 GitHub Release: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag_version.outputs.new_tag }}
            🐳 Docker 镜像: jhtone/relay:${{ steps.tag_version.outputs.new_tag }}
            
            🔍 查看日志: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # 7. 发送失败通知
      - name: Send Telegram Notification on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            ❌ Relay 转发面板发布或镜像构建失败！
            请检查 GitHub Actions 日志以定位错误：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
