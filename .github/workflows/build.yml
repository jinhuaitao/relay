name: Build and Release

on:
  push:
    branches:
      - "main"
    paths:
      - 'main.go'  # 只有当 main.go 被修改时才会触发
  workflow_dispatch:

permissions:
  contents: write

jobs:
  # 第一阶段：编译 (Build)
  build:
    name: Build for ${{ matrix.os }}/${{ matrix.arch }}
    runs-on: ubuntu-latest
    strategy:
      matrix:
        include:
          - os: linux
            arch: amd64
            filename: relay-linux-amd64
          - os: linux
            arch: arm64
            filename: relay-linux-arm64
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v4
        with:
          go-version: '1.21'

      - name: Download dependencies
        run: go mod download

      - name: Build Binary
        env:
          GOOS: ${{ matrix.os }}
          GOARCH: ${{ matrix.arch }}
          CGO_ENABLED: 0 
        run: |
          go build -ldflags "-s -w" -o ${{ matrix.filename }} main.go

      - name: Upload Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: binary-${{ matrix.os }}-${{ matrix.arch }}
          path: ${{ matrix.filename }}
          retention-days: 1

  # 第二阶段：发布 (Release)
  release:
    name: Create Release
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download All Artifacts
        uses: actions/download-artifact@v4
        with:
          path: ./artifacts

      - name: Bump version and push tag
        id: tag_version
        uses: mathieudutour/github-tag-action@v6.2
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          default_bump: patch

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          tag_name: ${{ steps.tag_version.outputs.new_tag }}
          name: Release ${{ steps.tag_version.outputs.new_tag }}
          body: ${{ steps.tag_version.outputs.changelog }}
          files: ./artifacts/**/*
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  # 新增：TG 编译发布成功通知
      - name: Send Telegram Notification
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            🎉 Relay 转发面板新版本发布成功！
            
            📦 项目: ${{ github.repository }}
            🏷️ 版本: ${{ steps.tag_version.outputs.new_tag }}
            🔗 下载地址: https://github.com/${{ github.repository }}/releases/tag/${{ steps.tag_version.outputs.new_tag }}

  # 新增：TG 编译失败通知 (可选，防止你没注意报错)
      - name: Send Telegram Notification on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            ❌ Relay 转发面板 Action 运行失败！
            请检查 GitHub Actions 日志：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
