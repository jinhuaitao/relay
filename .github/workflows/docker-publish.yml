name: Build and Push Docker Image

on:
  push:
    branches:
      - main
    paths:
      - 'main.go' # 仅当 main.go 被修改时才自动触发编译
  # - 'Dockerfile' # 提示：如果你希望修改 Dockerfile 时也触发，可以取消这行注释
  workflow_dispatch: # 允许在 GitHub Actions 页面手动点击触发

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Extract metadata (tags, labels) for Docker
        id: meta
        uses: docker/metadata-action@v5
        env:
          TZ: 'Asia/Tokyo'
        with:
          images: jhtone/relay
          tags: |
            type=raw,value=latest
            type=raw,value={{date 'YYYYMMDD'}}

      - name: Build and push Docker image
        uses: docker/build-push-action@v5
        with:
          context: .
          push: true
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}

      # 新增：TG Docker 镜像构建及推送成功通知
      - name: Send Telegram Notification on Success
        if: success()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            🐳 Docker 镜像构建并推送成功！
            
            📦 镜像库: jhtone/relay
            🏷️ 标签:
            ${{ steps.meta.outputs.tags }}
            🔍 查看 Action: https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}

      # 新增：TG Docker 镜像构建失败通知
      - name: Send Telegram Notification on Failure
        if: failure()
        uses: appleboy/telegram-action@master
        with:
          to: "5091290643"
          token: "8366224917:AAE9UCIzzcCG7Z0CZ8zw8KE5qEHayKI3KUE"
          message: |
            ❌ Docker 镜像构建或推送失败！
            请检查 GitHub Actions 日志以定位错误：https://github.com/${{ github.repository }}/actions/runs/${{ github.run_id }}
